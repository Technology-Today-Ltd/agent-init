services:
  traefik:
    image: traefik:latest
    restart: unless-stopped
    command:
      # Providers
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=app-network"

      # Entry points
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # HTTP to HTTPS redirect
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      # Let's Encrypt configuration
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      # API & Dashboard
      - "--api.dashboard=true"
      - "--api.insecure=true"
      # Logging
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Traefik dashboard (optional)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - app-network

  vite:
    image: ghcr.io/mijackk/agent-chat:latest
    restart: unless-stopped
    volumes:
      - vite-storage:/usr/share/nginx/html/config
    networks:
      - app-network
    depends_on:
      - app
    command: >
      sh -c 'echo "{ \"api_url\":\"${API_URL:-http://localhost}\"}" 
      > /usr/share/nginx/html/config/config.json 
      && nginx -g "daemon off;"'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vite.rule=Host(`${DOMAIN_NAME:-localhost}`)"
      - "traefik.http.routers.vite.priority=1"
      - "traefik.http.routers.vite.entrypoints=websecure"
      - "traefik.http.routers.vite.tls.certresolver=letsencrypt"
      - "traefik.http.services.vite.loadbalancer.server.port=80"
  app:
    image: ghcr.io/mijackk/agent-backend:latest
    restart: unless-stopped
    volumes:
      - image-store:/app/uploads
    depends_on:
      - db
      - redis
      - qdrant
    # Optional: use env_file instead
    networks:
      - app-network
    environment:
      - SQLALCHEMY_DATABASE_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db/mydb
      - RATE_LIMIT_STORAGE=redis://redis:6379/0
      - REDIS_CACHE_URL=redis://redis:6379/1
      - MODE=production
      - ALLOWED_ORIGINS=${DOMAIN_NAME:-http://localhost}
      - FRONTEND_DOMAIN=${DOMAIN_NAME:-http://localhost}
      # upload
      - UPLOAD_FOLDER=uploads
      #qdrant
      - collection=production
      - QDRANT_URL=http://qdrant:6333
      # mail
      - MAIL_SERVER=smtp.gmail.com
      - MAIL_PORT=587
      - MAIL_TSL=true
      - MAIL_SSL=false

    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`${DOMAIN_NAME:-localhost}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.app.priority=2"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls.certresolver=letsencrypt"
      - "traefik.http.services.app.loadbalancer.server.port=5000"

  # can delete the below if already installed

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    ports:
      - "${DB_PORT:-5433}:5432"

  redis:
    image: redis:latest
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - app-network
    volumes:
      - redis_data:/data
    # Optional: Add Redis configuration
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "${QDRANT_REST_PORT:-6333}:6333" # REST API
      - "${QDRANT_GRPC_PORT:-6334}:6334" # gRPC API (optional)
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - app-network
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    # Optional: Add custom Qdrant config
    # volumes:
    #   - ./qdrant_config.yaml:/qdrant/config/production.yaml

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  image-store:
  vite-storage:
  data:
  letsencrypt:

networks:
  app-network:
    name: app-network # Explicit name
    driver: bridge
